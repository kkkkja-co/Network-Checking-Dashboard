<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Privacy Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #09090b;
            --bg-secondary: #18181b;
            --bg-glass: rgba(24, 24, 27, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --border-highlight: rgba(59, 130, 246, 0.5);
            --accent-primary: #3b82f6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --radius-lg: 32px;
            --radius-md: 16px;
            --font-main: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        }
        body {
            font-family: var(--font-main);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            background-attachment: fixed;
            line-height: 1.6;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 60px 24px; }
        .card { 
            background: var(--bg-glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--border); 
            border-radius: var(--radius-lg); 
            padding: 48px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { 
            font-size: 2.5rem; 
            text-align: center; 
            margin-bottom: 8px; 
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #94a3b8); 
            background-clip: text; 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }
        .subhead { text-align: center; color: var(--text-secondary); margin-bottom: 32px; font-size: 1.05rem;}
        
        .email-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-md);
            padding: 16px;
            text-align: center;
            margin-bottom: 40px;
        }
        .email-box a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .email-box a:hover { text-decoration: underline; }

        .form-group { margin-bottom: 24px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--border-highlight);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        textarea.form-control { resize: vertical; min-height: 120px; }
        
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-primary), #60a5fa);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        .btn-submit:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 15px 25px rgba(59, 130, 246, 0.4);
        }
        .btn-submit:active {
            transform: scale(0.97);
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* UNIVERSAL HEADER */
        .top-nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(9, 9, 11, 0.75);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            height: 72px; display: flex; align-items: center; padding: 0 2rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .top-nav .nav-container { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1200px; margin: 0 auto; }
        .top-nav .logo-section { display: flex; align-items: center; font-weight: 800; font-size: 1.25rem; color: var(--text-primary); text-decoration: none; letter-spacing: -0.5px; transition: opacity 0.2s;}
        .top-nav .logo-section:hover { opacity: 0.8; }
        .top-nav .logo-text span { color: var(--accent-primary); }
        .top-nav .nav-links { display: flex; align-items: center; gap: 2.5rem; margin-right: 2.5rem; }
        .top-nav .nav-item { font-size: 0.95rem; font-weight: 600; color: var(--text-secondary); text-decoration: none; transition: color 0.3s ease; padding: 1rem 0; position: relative; }
        .top-nav .nav-item::after { content: ''; position: absolute; bottom: 0px; left: 50%; transform: translateX(-50%); width: 0; height: 2px; background: var(--accent-primary); transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 2px; }
        .top-nav .nav-item:hover { color: var(--text-primary); }
        .top-nav .nav-item:hover::after { width: 100%; }
        .top-nav .btn-primary { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: #fff; padding: 0.6rem 1.4rem; border-radius: 9999px; font-weight: 700; font-size: 0.9rem; text-decoration: none; transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .top-nav .btn-primary:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); }

        @media (max-width: 768px) {
            .top-nav .nav-links { display: none; }
            .top-nav .header-right { display: none; }
            .top-nav { padding: 0 1rem; }
        }
    </style>
</head>
<body>
    <header class="top-nav">
        <div class="nav-container">
            <a href="/" class="logo-section">
                <span style="font-size: 1.4rem; margin-right: 8px;">🛡️</span>
                <div class="logo-text">Privacy <span>Analyzer</span></div>
            </a>
            <div style="display: flex; align-items: center;">
                <nav class="nav-links">
                    <a href="/" class="nav-item">Dashboard</a>
                    <a href="privacy.html" class="nav-item">Privacy Policy</a>
                    <a href="tnu.html" class="nav-item">Terms of Use</a>
                    <a href="contact.html" class="nav-item">Contact Us</a>
                </nav>
                <div class="header-right">
                    <a href="https://bunorden.com" class="btn-primary" target="_blank">Bunorden Main</a>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h1>Contact Support</h1>
            <div class="subhead">Have a question or found a leak we missed?</div>

            <div class="email-box">
                <span style="color: var(--text-tertiary); font-size: 0.85rem; display: block; margin-bottom: 4px;">Direct Email Address:</span>
                <a href="mailto:contact@bunorden.com">contact@bunorden.com</a>
            </div>

            <form id="contactForm" onsubmit="handleForm(event)">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" class="form-control" placeholder="What is this regarding?" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" class="form-control" placeholder="Describe your inquiry..." required></textarea>
                </div>
                <button type="submit" class="btn-submit" id="btnSubmit">Send Message</button>
            </form>
        </div>
    </div>

    <script>
        function handleForm(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.textContent = 'Message Sent Successfully!';
            btn.style.background = 'var(--success)';
            btn.style.boxShadow = '0 10px 20px rgba(16, 185, 129, 0.3)';
            setTimeout(() => {
                document.getElementById('contactForm').reset();
                btn.textContent = 'Send Message';
                btn.style.background = '';
                btn.style.boxShadow = '';
            }, 3000);
        }
    </script>
</body>
</html>
